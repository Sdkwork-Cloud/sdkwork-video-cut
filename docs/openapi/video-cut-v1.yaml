          enum: [ok, warn, fail]
        label:
          type: string
        actionHint:
          type:
            - string
            - 'null'
        details:
          description: Free-form safe diagnostic metadata. Path-like values must use artifact-relative values or `<redacted-path>` instead of server-local absolute paths.
          type: object
          additionalProperties: true
    DiagnosticBundle:
      type: object
      required: [bundleVersion, generatedAt, deploymentMode, includes, capability, doctor, redactedConfig, artifacts]
      properties:
        bundleVersion:
          const: video-cut.diagnostics-bundle.v1
        generatedAt:
          type: string
          format: date-time
        deploymentMode:
          $ref: '#/components/schemas/DeploymentMode'
        includes:
          type: object
          required: [sourceMedia, transcript]
          properties:
            sourceMedia:
              type: boolean
              description: GET /diagnostics/bundle always returns false; POST /diagnostics/support-bundle may return true only after explicit user consent.
            transcript:
              type: boolean
              description: GET /diagnostics/bundle always returns false; POST /diagnostics/support-bundle may return true only after explicit user consent.
        supportRequest:
          $ref: '#/components/schemas/DiagnosticSupportBundleRequestEvidence'
        capability:
          $ref: '#/components/schemas/CapabilityReport'
        doctor:
          $ref: '#/components/schemas/DeploymentDoctorReport'
        redactedConfig:
          $ref: '#/components/schemas/RedactedVideoCutSettings'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticBundleArtifact'
    DiagnosticSupportBundleRequest:
      type: object
      required: [includeSourceMedia, includeTranscript, consentAccepted]
      properties:
        taskId:
          type: string
          description: Required when either sensitive attachment flag is true.
        includeSourceMedia:
          type: boolean
        includeTranscript:
          type: boolean
        consentAccepted:
          type: boolean
          description: Per-export explicit user consent for diagnostics support attachments.
    DiagnosticSupportBundleRequestEvidence:
      allOf:
        - $ref: '#/components/schemas/DiagnosticSupportBundleRequest'
        - type: object
          required: [schemaId]
          properties:
            schemaId:
              const: video-cut.diagnostics-support-bundle-request.v1
    DiagnosticBundleArtifact:
      type: object
      required: [kind, included, redacted]
      properties:
        kind:
          enum: [sourceMedia, transcript]
        taskId:
          type: string
        artifactId:
          type: string
        path:
          type: string
          description: Workspace-relative artifact path only; server-local absolute paths are forbidden.
        contentRef:
          type: string
          description: Private host-relative artifact content endpoint, never a server-local path.
        contentType:
          type: string
        included:
          type: boolean
        redacted:
          type: boolean
        reason:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        sha256:
          type: string
    ProviderConformanceRequest:
      type: object
      required: [target]
      properties:
        target:
          enum: [ai, speechToText, all]
    ProviderConformanceReport:
      type: object
      required: [reportVersion, providerId, status, generatedAt, checks]
      properties:
        reportVersion:
          const: video-cut.provider-conformance.v1
        providerId:
          type: string
        status:
          enum: [ok, warn, fail]
        generatedAt:
          type: string
          format: date-time
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ProviderConformanceCheck'
    ProviderConformanceCheck:
      type: object
      required: [checkId, status, label, details]
      properties:
        checkId:
          type: string
        status:
          enum: [ok, warn, fail]
        label:
          type: string
        actionHint:
          type:
            - string
            - 'null'
        details:
          description: Redacted provider conformance metadata. Credential evidence must use `credentialStatus`; details must not include secret refs, API keys, bearer tokens, Authorization headers, or raw provider payloads.
          type: object
          additionalProperties: true
    ProviderContractPolicy:
      type: object
      required: [providerCapabilityVersion, configurationSchemaId, openAiCompatible, speechToTextProviderProfiles, requiredPorts]
      properties:
        providerCapabilityVersion:
          const: video-cut.provider-capability.schema.v1
        configurationSchemaId:
          const: video-cut.openai-compatible-provider-config.schema.v1
