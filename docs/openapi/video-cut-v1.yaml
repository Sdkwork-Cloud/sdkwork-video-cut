openapi: 3.1.0
info:
  title: SDKWork Video Cut Standalone API
  version: 0.1.0
  summary: Canonical standalone video cutting host API.
  description: >
    Local-first video cutting API used by desktop-local, server-private,
    container-private, and kubernetes-private deployments. All business calls
    use the /api/video-cut/v1 route family and canonical JSON envelopes.
servers:
  - url: /api/video-cut/v1
tags:
  - name: runtime
  - name: providers
  - name: settings
  - name: assets
  - name: tasks
paths:
  /health:
    get:
      tags: [runtime]
      operationId: getHealth
      responses:
        '200':
          description: Host process health.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [status]
                        properties:
                          status:
                            const: ok
  /capabilities:
    get:
      tags: [runtime]
      operationId: getCapabilities
      responses:
        '200':
          description: Runtime capability report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityReportEnvelope'
  /doctor:
    get:
      tags: [runtime]
      operationId: getDeploymentDoctorReport
      responses:
        '200':
          description: Deployment doctor report with capability evidence and redacted effective config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDoctorReportEnvelope'
  /diagnostics/bundle:
    get:
      tags: [runtime]
      operationId: exportDiagnosticsBundle
      responses:
        '200':
          description: Redacted diagnostics bundle for support and deployment troubleshooting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticBundleEnvelope'
  /diagnostics/support-bundle:
    post:
      tags: [runtime]
      operationId: exportDiagnosticsSupportBundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticSupportBundleRequest'
      responses:
        '200':
          description: Redacted diagnostics support bundle with explicitly consented attachment descriptors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticBundleEnvelope'
        '400':
          description: DIAGNOSTICS_CONSENT_REQUIRED when source media or transcript attachments are requested without explicit consent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /providers/openai-compatible/conformance:
    post:
      tags: [providers]
      operationId: runOpenAiCompatibleProviderConformance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderConformanceRequest'
      responses:
        '200':
          description: Redacted dry-run conformance report for OpenAI-compatible provider settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderConformanceReportEnvelope'
  /settings:
    get:
      tags: [settings]
      operationId: getSettings
      responses:
        '200':
          description: Current persisted settings with secrets redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutSettingsEnvelope'
    put:
      tags: [settings]
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoCutSettings'
      responses:
        '200':
          description: Settings validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultEnvelope'
  /assets/catalog:
    get:
      tags: [assets]
      operationId: getAssetCatalog
      responses:
        '200':
          description: Runtime asset catalog for configured font, BGM, SFX, and cover template directories. Server-local absolute paths are redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCatalogEnvelope'
  /tasks:
    get:
      tags: [tasks]
      operationId: listTasks
      responses:
        '200':
          description: Task list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VideoCutTask'
    post:
      tags: [tasks]
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskInput'
      responses:
        '200':
          description: Created task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
  /tasks/{taskId}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [tasks]
      operationId: getTask
      responses:
        '200':
          description: Task detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [tasks]
      operationId: deleteTask
      responses:
        '200':
          description: Task deletion result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteTaskResult'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/source:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: attachTaskSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachTaskSourceInput'
      responses:
        '200':
          description: Attached source artifact metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutArtifactEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/source/file:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: uploadTaskSourceFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
            encoding:
              file:
                contentType: video/mp4, video/quicktime, video/x-matroska, video/webm, video/x-msvideo, video/mpeg, application/octet-stream
      responses:
        '200':
          description: Uploaded source file artifact metadata after writing to the workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutArtifactEnvelope'
        '400':
          description: Invalid multipart request (`MULTIPART_INVALID`), missing file field, or unsupported source media type (`SOURCE_FILE_TYPE_UNSUPPORTED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '413':
          description: Source file exceeds configured upload limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /tasks/{taskId}/analyze:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: analyzeTask
      responses:
        '200':
          description: Task after analysis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
        '400':
          description: Source media has not been uploaded or attached (`SOURCE_FILE_REQUIRED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/plan:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [tasks]
      operationId: getTaskPlan
      responses:
        '200':
          description: Current split plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoSplitPlanEnvelope'
        '404':
          description: Task or split plan was not found. `TASK_NOT_FOUND` means the task id is invalid; `TASK_PLAN_NOT_FOUND` means the task exists but analysis has not generated a split plan yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    put:
      tags: [tasks]
      operationId: updateTaskPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoSplitPlan'
      responses:
        '200':
          description: Updated split plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoSplitPlanEnvelope'
        '400':
          description: Invalid split-plan contract (`PLAN_INVALID`) or task ownership mismatch (`PLAN_TASK_ID_MISMATCH`). The existing plan and artifact manifest are not replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/transcript:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    put:
      tags: [tasks]
      operationId: updateTaskTranscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualTranscriptInput'
      responses:
        '200':
          description: Standard transcript document after manual import.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptDocumentEnvelope'
        '400':
          description: Invalid manual transcript segments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/subtitles/import:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    put:
      tags: [tasks]
      operationId: importTaskSubtitles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubtitleImportInput'
      responses:
        '200':
          description: Standard transcript document generated from SRT or VTT subtitle content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptDocumentEnvelope'
        '400':
          description: Invalid subtitle format, empty cues, invalid time ranges, or overlapping cues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/subtitles/export:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [tasks]
      operationId: exportTaskSubtitles
      parameters:
        - name: format
          in: query
          required: true
          schema:
            enum: [srt, vtt]
      responses:
        '200':
          description: SRT or VTT subtitle content generated from the standard transcript artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtitleExportOutputEnvelope'
        '400':
          description: Missing transcript or unsupported subtitle export format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/render:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: renderTask
      responses:
        '200':
          description: Task after rendering a real FFmpeg output artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
        '400':
          description: Missing uploaded source artifact or invalid render precondition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          description: FFmpeg could not process the source media or render inputs. Error details are returned through the standard redacted error envelope and a render log artifact when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /tasks/{taskId}/render/batch:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: renderTaskBatch
      responses:
        '200':
          description: Task after rendering every split-plan segment as separate render attempts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
        '400':
          description: Missing uploaded source artifact, empty split plan, or invalid render precondition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          description: One of the FFmpeg render attempts could not process its source media or render inputs. Completed attempts remain visible as artifacts and the failed attempt publishes a redacted render log when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /tasks/{taskId}/cancel:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [tasks]
      operationId: cancelTask
      responses:
        '200':
          description: Cancelled task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoCutTaskEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/events:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [tasks]
      operationId: getTaskEvents
      responses:
        '200':
          description: Task progress events.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VideoCutProgressEvent'
  /tasks/{taskId}/artifacts:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [tasks]
      operationId: getTaskArtifacts
      responses:
        '200':
          description: Task artifacts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VideoCutArtifact'
  /tasks/{taskId}/artifacts/{artifactId}/download:
    parameters:
      - $ref: '#/components/parameters/TaskId'
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [tasks]
      operationId: getArtifactDownload
      responses:
        '200':
          description: Download descriptor. Binary serving is kept behind this descriptor for local-first security.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ArtifactDownloadDescriptor'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /tasks/{taskId}/artifacts/{artifactId}/content:
    parameters:
      - $ref: '#/components/parameters/TaskId'
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [tasks]
      operationId: getArtifactContent
      parameters:
        - name: Range
          in: header
          required: false
          description: Optional single byte range for browser video playback, for example `bytes=0-1023`.
          schema:
            type: string
      responses:
        '200':
          description: Binary artifact content served through the host artifact repository for browser playback and server-safe downloads.
          headers:
            Accept-Ranges:
              description: Indicates that byte ranges are supported for artifact content.
              schema:
                const: bytes
            Cache-Control:
              description: Private artifact content must not be stored by shared or browser caches.
              schema:
                const: private, no-store
            Pragma:
              description: Legacy no-cache signal for private artifact content.
              schema:
                const: no-cache
            X-Content-Type-Options:
              description: Prevent MIME sniffing for artifact content responses.
              schema:
                const: nosniff
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            text/x-ssa:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial artifact content returned for a satisfiable single byte range request.
          headers:
            Accept-Ranges:
              description: Indicates that byte ranges are supported for artifact content.
              schema:
                const: bytes
            Content-Range:
              description: Served byte range and total artifact size.
              schema:
                type: string
                example: bytes 0-1023/4096
            Cache-Control:
              description: Private artifact content must not be stored by shared or browser caches.
              schema:
                const: private, no-store
            Pragma:
              description: Legacy no-cache signal for private artifact content.
              schema:
                const: no-cache
            X-Content-Type-Options:
              description: Prevent MIME sniffing for artifact content responses.
              schema:
                const: nosniff
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            text/x-ssa:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '416':
          description: Requested artifact byte range cannot be satisfied.
          headers:
            Accept-Ranges:
              description: Indicates that byte ranges are supported for artifact content.
              schema:
                const: bytes
            Content-Range:
              description: Total artifact size for an unsatisfied range request.
              schema:
                type: string
                example: bytes */4096
            Cache-Control:
              description: Private artifact content must not be stored by shared or browser caches.
              schema:
                const: private, no-store
            Pragma:
              description: Legacy no-cache signal for private artifact content.
              schema:
                const: no-cache
            X-Content-Type-Options:
              description: Prevent MIME sniffing for artifact content responses.
              schema:
                const: nosniff
        '404':
          $ref: '#/components/responses/NotFoundError'
components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequestError:
      description: Invalid request envelope. Malformed or schema-incompatible JSON request bodies return `REQUEST_JSON_INVALID`; multipart extractor failures return `MULTIPART_INVALID`; invalid path parameters return `PATH_PARAMETER_INVALID`; invalid query parameters return `QUERY_PARAMETER_INVALID`; all use the standard error envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
    NotFoundError:
      description: Resource was not found. Standard codes include `TASK_NOT_FOUND` for an invalid task id and `TASK_PLAN_NOT_FOUND` when a task exists but its split plan has not been generated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
    ConflictError:
      description: Request conflicts with the current task state. Render endpoints return `RENDER_ALREADY_RUNNING` when the selected task is already rendering.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          const: true
        data: {}
    ApiErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          const: false
        error:
          $ref: '#/components/schemas/ApiError'
    ApiError:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
          description: Stable machine-readable error code, including `REQUEST_JSON_INVALID` for malformed or schema-incompatible JSON request bodies, `MULTIPART_INVALID` for malformed multipart upload bodies, `PATH_PARAMETER_INVALID` for invalid path parameters, `QUERY_PARAMETER_INVALID` for invalid query parameters, `TASK_NOT_FOUND` for an invalid task id, `TASK_PLAN_NOT_FOUND` for a task whose split plan has not been generated, `ROUTE_NOT_FOUND` for unknown API routes, and `METHOD_NOT_ALLOWED` for unsupported methods on known API routes.
        message:
          type: string
        traceId:
          type: string
    CapabilityReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CapabilityReport'
    DeploymentDoctorReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeploymentDoctorReport'
    DiagnosticBundleEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DiagnosticBundle'
    ProviderConformanceReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProviderConformanceReport'
    VideoCutSettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VideoCutSettings'
    AssetCatalogEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AssetCatalog'
    ValidationResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ValidationResult'
    VideoCutTaskEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VideoCutTask'
    VideoCutArtifactEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VideoCutArtifact'
    VideoSplitPlanEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VideoSplitPlan'
    TranscriptDocumentEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TranscriptDocument'
    SubtitleExportOutputEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SubtitleExportOutput'
    CapabilityReport:
      type: object
      required: [reportVersion, deploymentMode, qualityTier, health, ai, speechToText, media, storage, security, providers]
      properties:
        reportVersion:
          const: video-cut.capability.v1
        deploymentMode:
          $ref: '#/components/schemas/DeploymentMode'
        qualityTier:
          enum: [basic, standard, interview, pro, batch]
        health:
          enum: [ok, degraded, unavailable]
        ai:
          $ref: '#/components/schemas/CapabilityStatus'
        speechToText:
          $ref: '#/components/schemas/CapabilityStatus'
        media:
          $ref: '#/components/schemas/CapabilityStatus'
        storage:
          $ref: '#/components/schemas/CapabilityStatus'
        security:
          $ref: '#/components/schemas/CapabilityStatus'
        providers:
          $ref: '#/components/schemas/ProviderContractPolicy'
    CapabilityStatus:
      type: object
      required: [status, label]
      properties:
        status:
          enum: [ok, warn, fail]
        label:
          type: string
        actionHint:
          type: string
        checkedTools:
          type: object
          additionalProperties:
            type: string
        missingTools:
          type: array
          items:
            type: string
    DeploymentDoctorReport:
      type: object
      required: [reportVersion, deploymentMode, generatedAt, health, capability, checks, redactedConfig]
      properties:
        reportVersion:
          const: video-cut.doctor.v1
        deploymentMode:
          $ref: '#/components/schemas/DeploymentMode'
        generatedAt:
          type: string
          format: date-time
        health:
          enum: [ok, degraded, unavailable]
        capability:
          $ref: '#/components/schemas/CapabilityReport'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentDoctorCheck'
