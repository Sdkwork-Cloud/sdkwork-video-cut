          type: array
          items:
            enum: [openai-audio-transcriptions, volcengine-bigasr-flash, aliyun-qwen-asr]
        requiredPorts:
          type: array
          items:
            enum: [LlmProviderPort, SpeechToTextPort, SubtitlePort, SecretStorePort]
