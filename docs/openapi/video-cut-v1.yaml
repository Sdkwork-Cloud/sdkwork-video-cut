        assets:
          $ref: '#/components/schemas/AssetSettings'
        storage:
          $ref: '#/components/schemas/RedactedStorageSettings'
        runtime:
          $ref: '#/components/schemas/RuntimeSettings'
        security:
          $ref: '#/components/schemas/SecuritySettings'
    AiProviderSettings:
