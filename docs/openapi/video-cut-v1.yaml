          type: object
          required: [chatCompletionsEndpoint, audioTranscriptionsEndpoint, structuredOutputModes, ollamaAllowed]
          properties:
            chatCompletionsEndpoint:
              const: /v1/chat/completions
            audioTranscriptionsEndpoint:
              const: /v1/audio/transcriptions
