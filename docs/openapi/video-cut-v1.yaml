        taskId:
          type: string
        audioArtifactId:
          type: string
        audioPath:
          type: string
        providerId:
          type: string
        adapterVersion:
          type: string
        transcriptStatus:
          $ref: '#/components/schemas/TranscriptStatus'
        language:
          type: string
        timestampGranularity:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TimestampGranularity'
        durationSeconds:
          type: number
          minimum: 0
        text:
          type: string
        segments:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptSegment'
        warnings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    TranscriptSegment:
      type: object
      required: [segmentId, startMs, endMs, text]
      properties:
        segmentId:
          type: string
        startMs:
          type: integer
          minimum: 0
        endMs:
          type: integer
          minimum: 1
        text:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        speakerId:
          type: string
    SemanticAnalysisStatus:
      enum: [ok, failed, provider-unavailable, transcript-unavailable]
    SemanticAnalysisDocument:
      type: object
      required:
        - schemaId
        - semanticAnalysisVersion
        - taskId
        - transcriptArtifactId
        - providerId
        - adapterVersion
        - semanticStatus
        - model
        - summary
        - topics
        - qaCandidates
        - warnings
        - createdAt
      properties:
        schemaId:
          const: video-cut.semantic-analysis.schema.v1
        semanticAnalysisVersion:
          const: 1
        taskId:
          type: string
        transcriptArtifactId:
          type: string
        providerId:
          type: string
        adapterVersion:
          type: string
        semanticStatus:
          $ref: '#/components/schemas/SemanticAnalysisStatus'
        model:
          type: string
        summary:
          type: string
        topics:
          type: array
          items:
            $ref: '#/components/schemas/SemanticTopic'
        qaCandidates:
          type: array
          items:
            $ref: '#/components/schemas/QaCandidate'
        warnings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    SemanticTopic:
      type: object
      required: [topicId, label, score]
      properties:
        topicId:
          type: string
        label:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
    QaCandidate:
      type: object
      required: [qaId, question, answer, sourceRange, score]
      properties:
        qaId:
          type: string
        question:
          type: string
        answer:
          type: string
        sourceRange:
          $ref: '#/components/schemas/TimeRangeMs'
        score:
          type: number
          minimum: 0
          maximum: 1
    VideoSplitPlan:
      type: object
      required: [schemaId, planVersion, planId, planRevision, taskId, sourceName, type, outputSpec, renderPreferences, tracks, segments, createdAt]
      properties:
        schemaId:
          const: video-cut.split-plan.schema.v1
        planVersion:
          const: 1
        planId:
          type: string
        planRevision:
          type: integer
        taskId:
          type: string
        sourceName:
          type: string
        type:
          $ref: '#/components/schemas/VideoCutType'
        outputSpec:
          $ref: '#/components/schemas/OutputVideoSpec'
        renderPreferences:
          $ref: '#/components/schemas/RenderPreferences'
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/TrackProvenance'
        segments:
          type: array
          items:
            $ref: '#/components/schemas/VideoSplitSegment'
        createdAt:
          type: string
          format: date-time
    OutputVideoSpec:
      type: object
      required: [aspectRatio, width, height, frameRate, format]
      properties:
        aspectRatio:
          const: 9:16
        width:
          type: integer
          minimum: 1
          description: Positive output width. Width and height must form a 9:16 ratio; 1080x1920 is the default production preset and smaller 9:16 values such as 360x640 are valid preview presets.
        height:
          type: integer
          minimum: 1
          description: Positive output height. Width and height must form a 9:16 ratio.
        frameRate:
          const: 30
        format:
          const: mp4
    RenderPreferences:
      type: object
      required: [audio]
      properties:
        audio:
          type: object
          required: [bgm, bgmVolumePercent, sfx, voiceEnhancement]
          properties:
            bgm:
              $ref: '#/components/schemas/RenderAudioAssetPreference'
            bgmVolumePercent:
              const: 20
            sfx:
              $ref: '#/components/schemas/RenderAudioAssetPreference'
            voiceEnhancement:
              const: basic
    RenderAudioAssetPreference:
      type: object
      required: [mode]
      properties:
        mode:
          enum:
            - auto
            - asset
            - disabled
        assetId:
          type: string
          pattern: '^(bgm|sfx)-[a-f0-9]{16}$'
          description: Required when mode=asset. Must come from GET /assets/catalog.
        path:
          type: string
          pattern: '^assets://(bgm|sfx)/[^\\/]+$'
          description: Required when mode=asset. Must be the logical assets:// reference from GET /assets/catalog.
    TrackProvenance:
      type: object
      required: [kind, sourceArtifactId, providerId, adapterVersion, inputHash, outputHash, parameters, warnings]
      properties:
        kind:
          enum: [mediaInfoTrack, silenceTrack, speechActivityTrack, transcriptTrack, sceneTrack, subjectTrack, semanticTrack, cutDecisionTrack]
        sourceArtifactId:
          type: string
        providerId:
          type: string
        adapterVersion:
          type: string
        inputHash:
          type: string
        outputHash:
          type: string
        parameters:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
        warnings:
          type: array
          items:
            type: string
    VideoSplitSegment:
      type: object
      required: [segmentId, title, type, sourceRange, outputRange, score, decisionReasons, hardConstraints, warnings]
      properties:
        segmentId:
          type: string
        title:
          type: string
        type:
          $ref: '#/components/schemas/VideoCutType'
        sourceRange:
          description: Source timeline range in milliseconds. Host-generated default plans clamp this range to probed media duration when media-info is available.
          $ref: '#/components/schemas/TimeRangeMs'
        outputRange:
          description: Output timeline range in milliseconds. For a single segment, endMs equals sourceRange duration.
          $ref: '#/components/schemas/TimeRangeMs'
        score:
          type: number
        decisionReasons:
          type: array
          items:
            enum: [sentence-boundary, silence-boundary, vad-confidence, semantic-boundary, duration-fit, manual-override]
        hardConstraints:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    TimeRangeMs:
      type: object
      required: [startMs, endMs]
      properties:
        startMs:
          type: integer
        endMs:
          type: integer
    SubtitleDocument:
      type: object
      required: [schemaId, subtitleVersion, subtitleId, taskId, planId, format, style, cues, warnings, createdAt]
      properties:
        schemaId:
          const: video-cut.subtitle-document.schema.v1
        subtitleVersion:
          const: 1
        subtitleId:
          type: string
        taskId:
          type: string
        planId:
          type: string
        format:
          const: internal
        style:
          $ref: '#/components/schemas/SubtitleStyle'
        cues:
          type: array
          items:
            $ref: '#/components/schemas/SubtitleCue'
        warnings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    SubtitleCue:
      type: object
      required: [cueId, sourceRange, outputRange, text, highlightWords]
      properties:
        cueId:
          type: string
        sourceRange:
          $ref: '#/components/schemas/TimeRangeMs'
        outputRange:
          $ref: '#/components/schemas/TimeRangeMs'
        text:
          type: string
        highlightWords:
          type: array
          items:
            type: string
    RenderRequest:
      type: object
      required: [schemaId, requestVersion, renderId, taskId, planId, planRevision, subtitleId, outputSpec, audio, codec, createdAt]
      properties:
        schemaId:
          const: video-cut.render-request.schema.v1
        requestVersion:
          const: 1
        renderId:
          type: string
        taskId:
          type: string
        planId:
          type: string
        planRevision:
          type: integer
        subtitleId:
          type: string
        outputSpec:
          $ref: '#/components/schemas/OutputVideoSpec'
        audio:
          type: object
          required: [bgmVolumePercent, sfxEnabled, voiceEnhancement]
          properties:
            bgmVolumePercent:
              const: 20
            sfxEnabled:
              type: boolean
            voiceEnhancement:
              const: basic
        codec:
          type: object
          required: [video, audio]
          properties:
            video:
              const: libx264
            audio:
              const: aac
        createdAt:
          type: string
          format: date-time
    RenderAttemptManifest:
      type: object
      required:
        - schemaId
        - renderAttemptVersion
        - taskId
        - renderId
        - planId
        - planRevision
        - sourceArtifactId
        - outputArtifactId
        - subtitleArtifactId
        - coverArtifactId
        - logArtifactId
        - subtitleBurnIn
        - subtitleCueCount
        - sourceRange
        - outputSpec
        - renderGraph
        - warnings
        - createdAt
      properties:
        schemaId:
          const: video-cut.render-attempt.schema.v1
        renderAttemptVersion:
          const: 1
        taskId:
          type: string
        renderId:
          type: string
        planId:
          type: string
        planRevision:
          type: integer
        sourceArtifactId:
          type: string
        transcriptArtifactId:
          type:
            - string
            - 'null'
        outputArtifactId:
          type: string
        subtitleArtifactId:
          type: string
        coverArtifactId:
          type: string
        logArtifactId:
          type: string
        subtitleBurnIn:
          type: boolean
        subtitleCueCount:
          type: integer
          minimum: 0
        sourceRange:
          $ref: '#/components/schemas/TimeRangeMs'
        outputSpec:
          $ref: '#/components/schemas/OutputVideoSpec'
        renderGraph:
          type: object
          required: [engine, adapterVersion, videoFilterPreset, audioFilterPreset, voiceEnhancement, bgm, sfx, codec]
          properties:
            engine:
              const: ffmpeg
            adapterVersion:
              const: ffmpeg-media-render.adapter.v1
            videoFilterPreset:
              enum:
                - standard-vertical-scale-crop-fps.v1
                - standard-vertical-scale-crop-fps-ass-burn-in.v1
            audioFilterPreset:
              const: voice-basic-loudnorm-afftdn.v1
            voiceEnhancement:
              type: object
              required: [status, filters]
              properties:
                status:
                  enum:
                    - applied
                    - skipped
                    - failed
                filters:
                  type: array
                  items:
                    enum:
                      - loudnorm
                      - afftdn
            bgm:
              type: object
              required: [status, mixed, volumePercent]
              properties:
                status:
                  enum:
                    - mixed
                    - not-configured
                    - unavailable
                    - disabled
                mixed:
                  type: boolean
                volumePercent:
                  const: 20
                asset:
                  $ref: '#/components/schemas/RenderAudioAssetProvenance'
            sfx:
              type: object
              required: [status, mixed]
              properties:
                status:
                  enum:
                    - mixed
                    - not-configured
                    - unavailable
                    - disabled
                mixed:
                  type: boolean
                asset:
                  $ref: '#/components/schemas/RenderAudioAssetProvenance'
            codec:
              type: object
              required: [video, audio]
              properties:
                video:
                  const: libx264
                audio:
                  const: aac
        warnings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    RenderAudioAssetProvenance:
      type: object
      required: [assetId, path, sha256, license, source, version]
      properties:
        assetId:
          type: string
          pattern: '^(bgm|sfx)-[a-f0-9]{16}$'
        path:
          type: string
          pattern: '^assets://(bgm|sfx)/[^\\\\]+$'
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        license:
          type: string
          minLength: 1
          description: SPDX-like license id or standard local provenance marker.
        source:
          type: string
          minLength: 1
          description: Sanitized public source reference; server-local absolute paths are forbidden.
        version:
          type: string
          minLength: 1
          description: Asset pack version or deterministic sha256-derived fallback version.
    ValidationResult:
      type: object
      required: [valid, errors]
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
