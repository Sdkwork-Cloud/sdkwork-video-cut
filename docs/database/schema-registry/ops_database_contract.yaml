contractVersion: 1.0.0
databaseContractVersion: 1
tableName: ops_database_contract
prefix: ops
profile: dictionary_entity
complianceLevel: L2
owner: runtime-platform
sourceOfTruth: database-bootstrap
description: Records the active database baseline contract version for explicit server/container/kubernetes bootstrap checks.
columns:
  - name: id
    logicalType: int64
    required: true
    primaryKey: true
  - name: uuid
    logicalType: string
    required: true
    unique: true
  - name: tenant_id
    logicalType: string
    required: true
  - name: contract_version
    logicalType: string
    required: true
  - name: baseline_name
    logicalType: string
    required: true
  - name: applied_by
    logicalType: string
    required: true
  - name: applied_at
    logicalType: instant
    required: true
  - name: created_at
    logicalType: instant
    required: true
  - name: updated_at
    logicalType: instant
    required: true
  - name: version
    logicalType: int64
    required: true
indexes:
  - name: uq_ops_database_contract_uuid
    type: unique
    columns: [uuid]
  - name: uq_ops_database_contract_version
    type: unique
    columns: [contract_version]
queryContracts:
  - id: read-active-database-contract
    description: Runtime readiness reads the active baseline contract version without mutating schema.
    predicates: [contract_version]
    orderBy: [id]
retention:
  policy: retain-for-database-lifetime
  deleteMode: none
sensitivity:
  level: internal
  secretStorage: forbidden
