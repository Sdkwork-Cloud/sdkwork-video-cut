contractVersion: 1.0.0
databaseContractVersion: 1
tableName: ops_worker_lease
prefix: ops
profile: temporary
complianceLevel: L2
owner: worker-runtime
sourceOfTruth: task-engine
description: Lease table for SQLite/PostgreSQL workers claiming tasks without double execution.
columns:
  - name: id
    logicalType: int64
    required: true
    primaryKey: true
  - name: uuid
    logicalType: string
    required: true
    unique: true
  - name: tenant_id
    logicalType: string
    required: true
  - name: worker_id
    logicalType: string
    required: true
    unique: true
  - name: lease_token
    logicalType: string
    required: true
    unique: true
  - name: status
    logicalType: string_enum
    required: true
    enumValues: [active, expired, released]
  - name: heartbeat_at
    logicalType: instant
    required: true
  - name: lease_expires_at
    logicalType: instant
    required: true
  - name: created_at
    logicalType: instant
    required: true
  - name: updated_at
    logicalType: instant
    required: true
  - name: version
    logicalType: int64
    required: true
indexes:
  - name: uq_ops_worker_lease_uuid
    type: unique
    columns: [uuid]
  - name: uq_ops_worker_lease_worker
    type: unique
    columns: [tenant_id, worker_id]
  - name: idx_ops_worker_lease_expiry
    type: normal
    columns: [tenant_id, status, lease_expires_at, id]
queryContracts:
  - id: renew-or-create-worker-lease
    description: Claim flow upserts a worker lease before marking a task claimed.
    predicates: [tenant_id, worker_id]
    orderBy: [id]
  - id: expire-dead-worker-leases
    description: Recovery scans active leases past lease_expires_at.
    predicates: [tenant_id, status, lease_expires_at]
    orderBy: [lease_expires_at, id]
retention:
  policy: expire-after-lease-window
  deleteMode: physical-after-recovery-window
sensitivity:
  level: internal
  secretStorage: forbidden
