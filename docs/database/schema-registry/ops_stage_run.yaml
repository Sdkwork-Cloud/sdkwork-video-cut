contractVersion: 1.0.0
databaseContractVersion: 1
tableName: ops_stage_run
prefix: ops
profile: event_log
complianceLevel: L2
owner: task-engine
sourceOfTruth: task-engine
description: Immutable stage attempt facts for analysis, render, retry, and recovery audits.
columns:
  - name: id
    logicalType: int64
    required: true
    primaryKey: true
  - name: uuid
    logicalType: string
    required: true
    unique: true
  - name: tenant_id
    logicalType: string
    required: true
  - name: task_uuid
    logicalType: string
    required: true
  - name: stage
    logicalType: string
    required: true
  - name: attempt_no
    logicalType: int32
    required: true
  - name: status
    logicalType: string_enum
    required: true
    enumValues: [running, succeeded, failed, cancelled, interrupted]
  - name: input_hash
    logicalType: string
    required: true
  - name: output_artifact_uuid
    logicalType: string
    required: false
  - name: diagnostics_json
    logicalType: json
    required: true
    jsonSchema: docs/database/json-schema/ops-stage-run-diagnostics.schema.json
  - name: started_at
    logicalType: instant
    required: true
  - name: finished_at
    logicalType: instant
    required: false
  - name: created_at
    logicalType: instant
    required: true
  - name: updated_at
    logicalType: instant
    required: true
  - name: version
    logicalType: int64
    required: true
indexes:
  - name: uq_ops_stage_run_uuid
    type: unique
    columns: [uuid]
  - name: uq_ops_stage_run_attempt
    type: unique
    columns: [tenant_id, task_uuid, stage, attempt_no]
  - name: idx_ops_stage_run_task_stage_created
    type: normal
    columns: [tenant_id, task_uuid, stage, created_at, id]
queryContracts:
  - id: list-stage-attempts-for-task
    description: Task details and diagnostics list stage attempts by task and stage.
    predicates: [tenant_id, task_uuid, stage]
    orderBy: [created_at, id]
retention:
  policy: retain-with-task
  deleteMode: cascade-with-task-soft-delete
sensitivity:
  level: internal
  secretStorage: forbidden
