contractVersion: 1.0.0
databaseContractVersion: 1
tableName: media_artifact
prefix: media
profile: projection
complianceLevel: L2
owner: artifact-repository
sourceOfTruth: filesystem-or-s3-compatible-storage
description: Queryable metadata for source, audio, analysis, plan, render, subtitle, cover, manifest, and log artifacts.
columns:
  - name: id
    logicalType: int64
    required: true
    primaryKey: true
  - name: uuid
    logicalType: string
    required: true
    unique: true
  - name: tenant_id
    logicalType: string
    required: true
  - name: task_uuid
    logicalType: string
    required: true
  - name: render_uuid
    logicalType: string
    required: false
  - name: kind
    logicalType: string_enum
    required: true
    enumValues: [source, audio, analysis, plan, render, subtitle, cover, render_manifest, log]
  - name: relative_path
    logicalType: string
    required: true
  - name: object_key
    logicalType: string
    required: false
  - name: storage_provider
    logicalType: string_enum
    required: true
    enumValues: [filesystem, s3_compatible]
  - name: size_bytes
    logicalType: int64
    required: true
  - name: sha256
    logicalType: string
    required: true
  - name: metadata_json
    logicalType: json
    required: true
    jsonSchema: docs/database/json-schema/media-artifact-metadata.schema.json
  - name: created_at
    logicalType: instant
    required: true
  - name: updated_at
    logicalType: instant
    required: true
  - name: version
    logicalType: int64
    required: true
  - name: deleted_at
    logicalType: instant
    required: false
indexes:
  - name: uq_media_artifact_uuid
    type: unique
    columns: [uuid]
  - name: idx_media_artifact_task_kind_created
    type: normal
    columns: [tenant_id, task_uuid, kind, created_at, id]
  - name: idx_media_artifact_render_kind_created
    type: normal
    columns: [tenant_id, render_uuid, kind, created_at, id]
queryContracts:
  - id: list-task-artifacts
    description: Results, diagnostics, and downloads list artifact metadata by task and kind.
    predicates: [tenant_id, task_uuid, kind]
    orderBy: [created_at, id]
  - id: list-render-artifacts
    description: Render result pages list artifacts by render id and kind.
    predicates: [tenant_id, render_uuid, kind]
    orderBy: [created_at, id]
retention:
  policy: soft-delete-then-retention-sweep
  deleteMode: soft-delete
sensitivity:
  level: internal
  secretStorage: forbidden
