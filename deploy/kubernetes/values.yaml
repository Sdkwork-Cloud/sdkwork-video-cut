replicaCount: 1

image:
  host:
    repository: sdkwork-video-cut-host
    tag: local
    pullPolicy: IfNotPresent
  web:
    repository: sdkwork-video-cut-web
    tag: local
    pullPolicy: IfNotPresent

runtime:
  deploymentMode: kubernetes-private
  bindHost: 0.0.0.0
  port: 6177
  authMode: reverse-proxy
  corsAllowedOrigins:
    - https://video-cut.example.com
  workspaceRoot: /data/workspace
  secretProvider: kubernetes-secret
  apiBasePath: /api/video-cut/v1

ai:
  baseUrl: ""
  chatModel: ""

speechToText:
  baseUrl: ""
  transcriptionModel: ""
  providerProfile: openai-audio-transcriptions
  resourceId: volc.bigasr.auc

service:
  type: ClusterIP
  webPort: 80

ingress:
  enabled: false
  className: ""
  host: video-cut.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  tls: []

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  storageClassName: ""

resources:
  host:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 6Gi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

secrets:
  aiApiKey: ""
  speechToTextApiKey: ""
  serverToken: ""

nodeSelector: {}
tolerations: []
affinity: {}
