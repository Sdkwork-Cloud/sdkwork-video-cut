apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sdkwork-video-cut
  labels:
    app.kubernetes.io/name: sdkwork-video-cut
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-video-cut
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-video-cut
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: host
          image: "{{ .Values.image.host.repository }}:{{ .Values.image.host.tag }}"
          imagePullPolicy: {{ .Values.image.host.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-sdkwork-video-cut-config
            - secretRef:
                name: {{ .Release.Name }}-sdkwork-video-cut-secret
          env:
            - name: SDKWORK_VIDEO_CUT_BIND_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-sdkwork-video-cut-config
                  key: SDKWORK_VIDEO_CUT_BIND_HOST
            - name: SDKWORK_VIDEO_CUT_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-sdkwork-video-cut-config
                  key: SDKWORK_VIDEO_CUT_PORT
            - name: SDKWORK_VIDEO_CUT_WORKSPACE_ROOT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-sdkwork-video-cut-config
                  key: SDKWORK_VIDEO_CUT_WORKSPACE_ROOT
            - name: SDKWORK_VIDEO_CUT_STT_PROVIDER_PROFILE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-sdkwork-video-cut-config
                  key: SDKWORK_VIDEO_CUT_STT_PROVIDER_PROFILE
            - name: SDKWORK_VIDEO_CUT_STT_RESOURCE_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-sdkwork-video-cut-config
                  key: SDKWORK_VIDEO_CUT_STT_RESOURCE_ID
          ports:
            - name: host
              containerPort: 6177
          readinessProbe:
            httpGet:
              path: /api/video-cut/v1/health
              port: host
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/video-cut/v1/health
              port: host
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources.host | indent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.runtime.workspaceRoot | quote }}
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          resources:
{{ toYaml .Values.resources.web | indent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-sdkwork-video-cut-config
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: workspace
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-sdkwork-video-cut-workspace
{{- else }}
          emptyDir: {}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
