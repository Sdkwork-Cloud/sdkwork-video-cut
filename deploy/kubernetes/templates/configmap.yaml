apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-sdkwork-video-cut-config
  labels:
    app.kubernetes.io/name: sdkwork-video-cut
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  SDKWORK_VIDEO_CUT_RUNTIME_MODE: {{ .Values.runtime.deploymentMode | quote }}
  SDKWORK_VIDEO_CUT_SECRET_PROVIDER: {{ .Values.runtime.secretProvider | quote }}
  SDKWORK_VIDEO_CUT_BIND_HOST: {{ .Values.runtime.bindHost | quote }}
  SDKWORK_VIDEO_CUT_PORT: {{ .Values.runtime.port | quote }}
  SDKWORK_VIDEO_CUT_WORKSPACE_ROOT: {{ .Values.runtime.workspaceRoot | quote }}
  SDKWORK_VIDEO_CUT_AUTH_MODE: {{ .Values.runtime.authMode | quote }}
  SDKWORK_VIDEO_CUT_CORS_ALLOWED_ORIGINS: {{ join "," .Values.runtime.corsAllowedOrigins | quote }}
  SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_BASE_URL: {{ .Values.ai.baseUrl | quote }}
  SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_CHAT_MODEL: {{ .Values.ai.chatModel | quote }}
  SDKWORK_VIDEO_CUT_STT_BASE_URL: {{ .Values.speechToText.baseUrl | quote }}
  SDKWORK_VIDEO_CUT_STT_TRANSCRIPTION_MODEL: {{ .Values.speechToText.transcriptionModel | quote }}
  SDKWORK_VIDEO_CUT_STT_PROVIDER_PROFILE: {{ .Values.speechToText.providerProfile | quote }}
  SDKWORK_VIDEO_CUT_STT_RESOURCE_ID: {{ .Values.speechToText.resourceId | quote }}
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      client_max_body_size 2048m;
      proxy_connect_timeout 30s;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      location {{ .Values.runtime.apiBasePath }}/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:6177;
      }

      location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
      }
    }
