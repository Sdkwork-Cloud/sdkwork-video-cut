name: sdkwork-video-cut

services:
  video-cut-host:
    image: sdkwork-video-cut-host:local
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: host-runtime
    environment:
      SDKWORK_VIDEO_CUT_RUNTIME_MODE: container-private
      SDKWORK_VIDEO_CUT_BIND_HOST: 0.0.0.0
      SDKWORK_VIDEO_CUT_PORT: "6177"
      SDKWORK_VIDEO_CUT_WORKSPACE_ROOT: /data/workspace
      SDKWORK_VIDEO_CUT_AUTH_MODE: reverse-proxy
      SDKWORK_VIDEO_CUT_CORS_ALLOWED_ORIGINS: ${SDKWORK_VIDEO_CUT_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8787,http://localhost:8787}
      SDKWORK_VIDEO_CUT_SECRET_PROVIDER: env
      SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_BASE_URL: ${SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_BASE_URL:-}
      SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_API_KEY: ${SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_API_KEY:-}
      SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_CHAT_MODEL: ${SDKWORK_VIDEO_CUT_OPENAI_COMPATIBLE_CHAT_MODEL:-}
      SDKWORK_VIDEO_CUT_STT_BASE_URL: ${SDKWORK_VIDEO_CUT_STT_BASE_URL:-}
      SDKWORK_VIDEO_CUT_STT_API_KEY: ${SDKWORK_VIDEO_CUT_STT_API_KEY:-}
      SDKWORK_VIDEO_CUT_STT_TRANSCRIPTION_MODEL: ${SDKWORK_VIDEO_CUT_STT_TRANSCRIPTION_MODEL:-}
      SDKWORK_VIDEO_CUT_STT_PROVIDER_PROFILE: ${SDKWORK_VIDEO_CUT_STT_PROVIDER_PROFILE:-openai-audio-transcriptions}
      SDKWORK_VIDEO_CUT_STT_RESOURCE_ID: ${SDKWORK_VIDEO_CUT_STT_RESOURCE_ID:-volc.bigasr.auc}
    volumes:
      - video-cut-workspace:/data/workspace
    expose:
      - "6177"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6177/api/video-cut/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  video-cut-web:
    image: sdkwork-video-cut-web:local
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: web-runtime
    depends_on:
      video-cut-host:
        condition: service_healthy
    ports:
      - "8787:80"

volumes:
  video-cut-workspace:
    driver: local
